<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AEI Labs</title>
    <script>
      // SPA redirect for GitHub Pages
      // When GH Pages 404s on a client-side route, this page encodes the path
      // into a query string and redirects to the app root, which decodes it.
      // pathSegmentsToKeep=1 because the site lives under /AEILabs/ (project page).
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
